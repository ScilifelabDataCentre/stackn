apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appname }}
  namespace: {{ .Values.namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: dash-deployment
      project: {{ .Values.project.slug }}
      type: app
      pod: dash
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: dash-deployment
        project: {{ .Values.project.slug }}
        type: app
        pod: dash
    spec:
      containers:
      - name: gatekeeper
        image: scaleoutsystems/gatekeeper:latest
        imagePullPolicy: Always
        resources:
          limits:
            memory: 512Mi
            cpu: 200m
        args:
          - --config=/etc/secrets/gatekeeper.yaml
        ports:
          - containerPort: 9090
        volumeMounts:
        - name: gatekeeper-config
          mountPath: /etc/secrets/
      - name: dash
        image: hamzaisaeed/wordcloud
        imagePullPolicy: Always
        # command: ["/bin/bash"]
        # args: ["-c", "cd ..;./deploy.sh"]
        resources:
          limits:
            memory: 1Gi
            cpu: 1000m
        ports:
          - containerPort: 3838
        env:
        {{ if .Values.deployment.debug }}
        - name: DEBUG
          value: "true"
        {{ else }}
        - name: DEBUG
          value: "false"
        {{ end }}
        - name: DEPLOYMENT_PATH
          value: {{ .Values.deployment.path }}
      volumes:
      - name: gatekeeper-config
        configMap:
          name: {{ .Release.Name }}-gatekeeper-config
      {{- range $key, $value := .Values.apps.volume }}
      - name: {{ $key }}
        persistentVolumeClaim:
          claimName: {{ $value.release }}
      {{- end }}
